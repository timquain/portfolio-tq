      <stop offset=".55" stop-color="#f2eadb"/>
      <stop offset="1" stop-color="#dceae5"/>
    </linearGradient>
    <linearGradient id="panel" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#26352b"/>
      <stop offset="1" stop-color="#2f7f74"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="18" stdDeviation="18" flood-color="#2f261d" flood-opacity=".18"/>
    </filter>
  </defs>
  <rect width="960" height="720" rx="28" fill="url(#bg)"/>
