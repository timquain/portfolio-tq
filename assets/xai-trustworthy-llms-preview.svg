<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 720" role="img" aria-labelledby="title desc">
  <title id="title">Explainable AI and trustworthy LLMs visual preview</title>
  <desc id="desc">A professional slide-style diagram showing an AI model connected to transparency, validation, fairness, and governance signals.</desc>
  <defs>
