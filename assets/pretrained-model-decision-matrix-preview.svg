<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 900" role="img" aria-labelledby="title desc">
  <title id="title">Pre-trained AI model decision matrix preview</title>
  <desc id="desc">A portfolio preview comparing pre-trained models across NLP, generative AI, computer vision, and tabular data.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#fffaf0"/>
      <stop offset=".52" stop-color="#f1eadb"/>
      <stop offset="1" stop-color="#dceee8"/>
    </linearGradient>
    <linearGradient id="dark" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#20241f"/>
      <stop offset="1" stop-color="#2f7f74"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="18" stdDeviation="18" flood-color="#2f261d" flood-opacity=".18"/>
    </filter>
  </defs>
  <rect width="1200" height="900" fill="url(#bg)"/>
  <path d="M0 95 C210 20 370 40 535 100 C730 172 910 120 1200 38 L1200 0 L0 0 Z" fill="#26352b" opacity=".95"/>
  <path d="M0 815 C185 760 360 792 530 826 C735 866 910 832 1200 735 L1200 900 L0 900 Z" fill="#b95f3d" opacity=".14"/>
  <g fill="none" stroke="#20241f" stroke-opacity=".07" stroke-width="2">
    <path d="M105 150 H1100"/>
    <path d="M105 270 H1100"/>
    <path d="M105 390 H1100"/>
    <path d="M105 510 H1100"/>
    <path d="M105 630 H1100"/>
    <path d="M105 750 H1100"/>
    <path d="M250 130 V790"/>
    <path d="M470 130 V790"/>
    <path d="M690 130 V790"/>
    <path d="M910 130 V790"/>
  </g>
  <g filter="url(#shadow)">
    <rect x="80" y="120" width="1040" height="650" rx="28" fill="#fffcf4"/>
    <rect x="80" y="120" width="1040" height="88" rx="28" fill="url(#dark)"/>
    <rect x="80" y="178" width="1040" height="30" fill="#26352b"/>
  </g>
  <text x="115" y="176" fill="#fffaf0" font-family="Georgia, serif" font-size="38" font-weight="700">Pre-trained Model Decision Matrix</text>
  <text x="115" y="238" fill="#6f766f" font-family="Arial, sans-serif" font-size="21" font-weight="700">DOMAIN</text>
  <text x="310" y="238" fill="#6f766f" font-family="Arial, sans-serif" font-size="21" font-weight="700">BEST FIT</text>
  <text x="525" y="238" fill="#6f766f" font-family="Arial, sans-serif" font-size="21" font-weight="700">SIZE / SPEED</text>
  <text x="745" y="238" fill="#6f766f" font-family="Arial, sans-serif" font-size="21" font-weight="700">ACCURACY</text>
  <text x="935" y="238" fill="#6f766f" font-family="Arial, sans-serif" font-size="21" font-weight="700">EXPLAINABILITY</text>
  <g font-family="Arial, sans-serif">
    <g transform="translate(115 280)">
      <rect width="145" height="58" rx="18" fill="#e9f4ef"/>
      <text x="22" y="37" fill="#26352b" font-size="22" font-weight="700">NLP</text>
      <text x="195" y="23" fill="#20241f" font-size="24" font-weight="700">DistilBERT</text>
      <text x="195" y="52" fill="#6f766f" font-size="18">fast classification baseline</text>
      <circle cx="462" cy="30" r="22" fill="#3d8d5a"/>
      <circle cx="540" cy="30" r="22" fill="#3d8d5a"/>
      <circle cx="680" cy="30" r="22" fill="#b95f3d"/>
      <circle cx="875" cy="30" r="22" fill="#d7a64a"/>
    </g>
    <g transform="translate(115 400)">
      <rect width="145" height="58" rx="18" fill="#f7eadf"/>
      <text x="22" y="37" fill="#26352b" font-size="22" font-weight="700">GenAI</text>
      <text x="195" y="23" fill="#20241f" font-size="24" font-weight="700">Llama 3.1 8B</text>
      <text x="195" y="52" fill="#6f766f" font-size="18">practical generation trade-off</text>
      <circle cx="462" cy="30" r="22" fill="#d7a64a"/>
      <circle cx="540" cy="30" r="22" fill="#d7a64a"/>
      <circle cx="680" cy="30" r="22" fill="#3d8d5a"/>
      <circle cx="875" cy="30" r="22" fill="#b95f3d"/>
    </g>
    <g transform="translate(115 520)">
      <rect width="145" height="58" rx="18" fill="#e8eef5"/>
      <text x="22" y="37" fill="#26352b" font-size="22" font-weight="700">Vision</text>
      <text x="195" y="23" fill="#20241f" font-size="24" font-weight="700">ResNet-50</text>
      <text x="195" y="52" fill="#6f766f" font-size="18">balanced transfer-learning choice</text>
      <circle cx="462" cy="30" r="22" fill="#d7a64a"/>
      <circle cx="540" cy="30" r="22" fill="#d7a64a"/>
      <circle cx="680" cy="30" r="22" fill="#3d8d5a"/>
      <circle cx="875" cy="30" r="22" fill="#3d8d5a"/>
    </g>
    <g transform="translate(115 640)">
      <rect width="145" height="58" rx="18" fill="#f1eadb"/>
      <text x="22" y="37" fill="#26352b" font-size="22" font-weight="700">Tabular</text>
      <text x="195" y="23" fill="#20241f" font-size="24" font-weight="700">XGBoost / CatBoost</text>
      <text x="195" y="52" fill="#6f766f" font-size="18">production structured-data baseline</text>
      <circle cx="462" cy="30" r="22" fill="#3d8d5a"/>
      <circle cx="540" cy="30" r="22" fill="#3d8d5a"/>
      <circle cx="680" cy="30" r="22" fill="#3d8d5a"/>
      <circle cx="875" cy="30" r="22" fill="#3d8d5a"/>
    </g>
  </g>
  <g transform="translate(120 810)" font-family="Arial, sans-serif" font-size="20" fill="#20241f">
    <circle cx="0" cy="-7" r="13" fill="#3d8d5a"/><text x="24" y="0">favorable</text>
    <circle cx="145" cy="-7" r="13" fill="#d7a64a"/><text x="169" y="0">moderate</text>
    <circle cx="300" cy="-7" r="13" fill="#b95f3d"/><text x="324" y="0">costly or low transparency</text>
  </g>
</svg>
